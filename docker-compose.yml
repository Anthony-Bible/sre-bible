services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: sre
      POSTGRES_PASSWORD: sre
      POSTGRES_DB: sre_bible
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sre -d sre_bible"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
