name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'deploy/deployment.yaml'
  pull_request:
  workflow_dispatch:

jobs:
  determine_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.vars.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set version
        id: vars
        run: |
          echo "VERSION=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest
    needs: determine_version
    outputs:
      image_digest: ${{ steps.push.outputs.digest }}
    env:
      VERSION: ${{ needs.determine_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.PUSH_SECRET }}
      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/anthony-bible/sre-bible:${{ env.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  render_and_deploy:
    runs-on: ubuntu-latest
    needs: [determine_version, build]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.determine_version.outputs.version }}
      IMAGE_DIGEST: ${{ needs.build.outputs.image_digest }}
    steps:
      - uses: actions/checkout@v4
      - name: Render deployment manifest
        run: |
          sed -i "s|%{IMAGE_SHA}|${IMAGE_DIGEST}|g" deploy/deployment.yaml
      - name: Commit updated manifest
        run: |
          git config user.email "cd@sre.bible"
          git config user.name "github-actions[bot]"
          git add deploy/deployment.yaml
          git commit -m "chore(deploy): update image digest to ${VERSION}" || echo "No changes to commit"
      - name: Push manifest
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
