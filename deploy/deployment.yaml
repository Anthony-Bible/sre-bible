apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-bible
  namespace: sre-bible
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sre-bible
  template:
    metadata:
      labels:
        app: sre-bible
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: sre-bible
      terminationGracePeriodSeconds: 40
      initContainers:
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.22.0
          restartPolicy: Always
          args:
            - "--structured-logs"
            - "--port=5432"
            - "gen-lang-client-0479899208:us-central1:sre-bible"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
      containers:
        - name: sre-bible
          image: ghcr.io/anthony-bible/sre-bible@sha256:eb6b86882aad4a75b383642737d27950003c2b430e12fa2048226718b900de4b
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: LOG_FORMAT
              value: "json"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sre-bible-secrets
                  key: ANTHROPIC_API_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sre-bible-secrets
                  key: GEMINI_API_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sre-bible-secrets
                  key: DATABASE_URL
            - name: EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: sre-bible-secrets
                  key: EMAIL_FROM
            - name: EMAIL_TO
              valueFrom:
                secretKeyRef:
                  name: sre-bible-secrets
                  key: EMAIL_TO
            - name: AWS_REGION
              value: "us-west-2"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: sre-bible-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: sre-bible-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: TURNSTILE_SITE_KEY
              value: "0x4AAAAAADgYcZEOr5G-BmBi"
            - name: TURNSTILE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: sre-bible-secrets
                  key: TURNSTILE_SECRET_KEY
            # Model Armor prompt-injection gate. The template resource name is not a
            # secret. Auth is via Workload Identity (ADC) on the sre-bible SA, which
            # must hold roles/modelarmor.user — there is no API key. Fatal if unset.
            - name: MODEL_ARMOR_TEMPLATE
              value: "projects/gen-lang-client-0479899208/locations/us-central1/templates/sre-bible"
            # Follow-up suggestion generator backend (suggester only; main chat stays
            # Anthropic-native). FOLLOWUP_BASE_URL unset → Anthropic default. When set,
            # FOLLOWUP_MODEL is required (fatal if missing). FOLLOWUP_API_KEY/EXTRA_BODY
            # are optional. optional:true so a missing secret key degrades to the default
            # path instead of crash-looping every pod (the app treats all four as optional).
            - name: FOLLOWUP_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: sre-bible-secrets
                  key: FOLLOWUP_BASE_URL
                  optional: true
            - name: FOLLOWUP_MODEL
              valueFrom:
                secretKeyRef:
                  name: sre-bible-secrets
                  key: FOLLOWUP_MODEL
                  optional: true
            - name: FOLLOWUP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sre-bible-secrets
                  key: FOLLOWUP_API_KEY
                  optional: true
            - name: FOLLOWUP_EXTRA_BODY
              valueFrom:
                secretKeyRef:
                  name: sre-bible-secrets
                  key: FOLLOWUP_EXTRA_BODY
                  optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
