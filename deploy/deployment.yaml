apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-bible
  namespace: sre-bible
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sre-bible
  template:
    metadata:
      labels:
        app: sre-bible
    spec:
      serviceAccountName: sre-bible
      terminationGracePeriodSeconds: 40
      initContainers:
        - name: cloud-sql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.22.0
          restartPolicy: Always
          args:
            - "--structured-logs"
            - "--port=5432"
            - "gen-lang-client-0479899208:us-central1:sre-bible"
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            runAsNonRoot: true
      containers:
        - name: sre-bible
          image: ghcr.io/anthony-bible/sre-bible@sha256:025c60aec166b2e2ec38e4f155c4d0863e5f63b40115327d30db55d57c1dd69a
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: LOG_FORMAT
              value: "json"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sre-bible-secrets
                  key: ANTHROPIC_API_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sre-bible-secrets
                  key: GEMINI_API_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sre-bible-secrets
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
