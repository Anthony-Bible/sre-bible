apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sre-bible
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Anthony-Bible/sre-bible
    # Tracks the CD-managed release branch, not `main`. CI renders `main` + the
    # resolved image digest and force-pushes it to `deploy-state`, keeping `main`
    # protected and free of automated digest-bump commits. See .github/workflows/build.yml.
    targetRevision: deploy-state
    path: deploy
    directory:
      exclude: "argocd/**"
  destination:
    server: https://kubernetes.default.svc
    namespace: sre-bible
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
