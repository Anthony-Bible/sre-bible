apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sre-bible
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Anthony-Bible/sre-bible
    targetRevision: main
    path: deploy
    directory:
      exclude: "argocd/**"
  destination:
    server: https://kubernetes.default.svc
    namespace: sre-bible
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
